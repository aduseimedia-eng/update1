<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#006B3F">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Subscriptions - KudiSave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { padding-top: 0 !important; }

    /* Header */
    .mtn-header { background: linear-gradient(160deg, var(--primary-color, #006B3F) 0%, #004d2c 40%, #003822 80%, #002a19 100%); position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding-top: env(safe-area-inset-top, 0px); padding-left: env(safe-area-inset-left, 0px); padding-right: env(safe-area-inset-right, 0px); overflow: hidden; }
    .mtn-header::before { content: ''; position: absolute; top: -50%; right: -20%; width: 260px; height: 260px; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); border-radius: 50%; pointer-events: none; animation: floatOrb1 8s ease-in-out infinite; }
    .mtn-header::after { content: ''; position: absolute; bottom: -40%; left: -15%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%); border-radius: 50%; pointer-events: none; animation: floatOrb2 10s ease-in-out infinite; }
    .mtn-topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 0 16px; position: relative; z-index: 1; }
    .mtn-back-btn { width: 38px; height: 38px; border-radius: 12px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.25s; text-decoration: none; }
    .mtn-back-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.18); }
    .mtn-back-btn i { width: 18px; height: 18px; }
    .mtn-page-title { font-size: 17px; font-weight: 700; color: white; letter-spacing: -0.3px; }
    .mtn-topbar-spacer { width: 38px; }
    .mtn-info-section { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 16px 8px 16px; position: relative; z-index: 1; text-align: center; animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both; }
    .mtn-info-icon { width: 46px; height: 46px; border-radius: 15px; background: rgba(255,255,255,0.12); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 4px 16px rgba(0,0,0,0.12); color: white; animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.25s both; }
    .mtn-info-icon i { width: 22px; height: 22px; }
    .mtn-info-title { font-size: 18px; font-weight: 700; color: white; letter-spacing: -0.3px; margin-top: 2px; animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both; }
    .mtn-info-subtitle { font-size: 12px; color: rgba(255,255,255,0.65); font-weight: 500; animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both; }

    .mtn-header-curve { position: absolute; bottom: 0; left: 0; right: 0; height: 10px; background: var(--bg-primary, #f5f6fa); border-radius: 16px 16px 0 0; opacity: 0.35; }
    [data-theme="dark"] .mtn-header-curve { background: var(--bg-primary, #0f172a); opacity: 0.25; }
    .mtn-header-spacer { height: 280px; }

    /* ===== Header Balance Section ===== */
    .header-balance { text-align: center; padding: 4px 20px 10px; position: relative; z-index: 1; animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both; }
    .header-balance-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .header-balance-label::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: linear-gradient(135deg, #34d399, #10b981); box-shadow: 0 0 8px rgba(52,211,153,0.5); animation: pulse-dot 2s ease-in-out infinite; }
    .header-balance-amount { font-size: 26px; font-weight: 800; color: #ffffff; letter-spacing: -1px; line-height: 1.1; margin-bottom: 2px; text-shadow: 0 2px 8px rgba(0,0,0,0.15); animation: balanceGlow 3s ease-in-out infinite; }
    .header-balance-sub { font-size: 11px; color: rgba(255,255,255,0.45); font-weight: 500; margin-bottom: 6px; }
    .header-balance-row { display: flex; justify-content: center; gap: 8px; }
    .header-balance-item { text-align: center; flex: 1; padding: 6px 4px; border-radius: 12px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; transition: transform 0.2s ease, background 0.2s ease; }
    .header-balance-item:nth-child(1) { animation-delay: 0.5s; }
    .header-balance-item:nth-child(2) { animation-delay: 0.6s; }
    .header-balance-item:nth-child(3) { animation-delay: 0.7s; }
    .header-balance-item:active { transform: scale(0.96); background: rgba(255,255,255,0.15); }
    .header-balance-item-label { font-size: 8px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-bottom: 1px; }
    .header-balance-item-value { font-size: 13px; font-weight: 700; letter-spacing: -0.3px; }
    .header-balance-item-value.active-count { color: #6ee7b7; }
    .header-balance-item-value.due-soon { color: #fde68a; }
    .header-balance-item-value.overdue { color: #fca5a5; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }
    @keyframes balanceGlow { 0%, 100% { text-shadow: 0 2px 8px rgba(0,0,0,0.15); } 50% { text-shadow: 0 2px 16px rgba(52,211,153,0.3), 0 2px 8px rgba(0,0,0,0.15); } }

    /* Header shimmer sweep */
    .mtn-header-shimmer { position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%); z-index: 0; animation: headerShimmer 6s ease-in-out infinite; pointer-events: none; }

    /* Floating particles */
    .header-particles { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; z-index: 0; pointer-events: none; }
    .header-particle { position: absolute; width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.15); animation: particleFloat linear infinite; }
    .header-particle:nth-child(1) { left: 10%; bottom: -5px; animation-duration: 12s; animation-delay: 0s; width: 2px; height: 2px; }
    .header-particle:nth-child(2) { left: 30%; bottom: -5px; animation-duration: 14s; animation-delay: 2s; width: 4px; height: 4px; background: rgba(52,211,153,0.12); }
    .header-particle:nth-child(3) { left: 55%; bottom: -5px; animation-duration: 10s; animation-delay: 4s; }
    .header-particle:nth-child(4) { left: 75%; bottom: -5px; animation-duration: 16s; animation-delay: 1s; width: 2px; height: 2px; background: rgba(110,231,183,0.1); }
    .header-particle:nth-child(5) { left: 90%; bottom: -5px; animation-duration: 11s; animation-delay: 3s; }

    /* Header animation keyframes */
    @keyframes floatOrb1 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(15px, 20px) scale(1.05); } 66% { transform: translate(-10px, -15px) scale(0.95); } }
    @keyframes floatOrb2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(20px, -25px) scale(1.1); } }
    @keyframes headerShimmer { 0% { left: -100%; } 40%, 100% { left: 200%; } }
    @keyframes particleFloat { 0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 0.5; } 100% { transform: translateY(-350px) translateX(20px) scale(0); opacity: 0; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }

    /* Summary card */
    .summary-card { background: linear-gradient(135deg, var(--primary-color, #006B3F) 0%, #004d2c 60%, #002a19 100%); border-radius: 20px; padding: 20px; margin: 0 0 16px 0; color: white; position: relative; overflow: hidden; }
    .summary-card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 14px; }
    .summary-item { text-align: center; }
    .summary-value { font-size: 18px; font-weight: 800; color: #a5f3c0; letter-spacing: -0.5px; }
    .summary-label { font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
    .summary-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 2px; }
    .summary-monthly { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .summary-divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 14px 0 0 0; }

    /* Alert banners */
    .alert-banner { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: 12px; margin-bottom: 10px; font-size: 13px; line-height: 1.4; }
    .alert-banner i { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
    .alert-warning { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.25); }
    .alert-danger  { background: rgba(239,68,68,0.12);  color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }
    .alert-info    { background: rgba(0,107,63,0.12); color: var(--primary-color, #006B3F); border: 1px solid rgba(0,107,63,0.25); }
    .alert-success { background: rgba(34,197,94,0.12);  color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border-color, #e5e7eb); background: var(--card-bg, #fff); color: var(--text-secondary, #6b7280); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .filter-tab.active { background: var(--primary-color, #006B3F); border-color: var(--primary-color, #006B3F); color: white; box-shadow: 0 4px 12px rgba(0,107,63,0.3); }
    .filter-tab .tab-count { display: inline-flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.12); width: 18px; height: 18px; border-radius: 50%; font-size: 10px; margin-left: 4px; }
    .filter-tab.active .tab-count { background: rgba(255,255,255,0.25); }

    /* Subscription card */
    .sub-card { background: var(--card-bg, #fff); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border-color, #e5e7eb); transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .sub-card:active { transform: scale(0.99); }
    .sub-card.overdue { border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.03); }
    .sub-card.due-soon { border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.03); }
    .sub-card.cancelled { opacity: 0.5; }
    .sub-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .sub-icon { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--primary-color, #006B3F), #00a855); display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; flex-shrink: 0; font-weight: 700; }
    .sub-name { font-size: 16px; font-weight: 700; color: var(--text-primary, #1f2937); }
    .sub-category { font-size: 12px; color: var(--text-secondary, #6b7280); margin-top: 1px; font-weight: 500; }
    .sub-amount { margin-left: auto; text-align: right; }
    .sub-amount-value { font-size: 18px; font-weight: 800; color: var(--primary-color, #006B3F); }
    .sub-amount-freq { font-size: 11px; color: var(--text-secondary, #6b7280); font-weight: 500; }
    .sub-meta { display: flex; align-items: center; justify-content: space-between; }
    .due-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
    .due-badge.overdue { background: rgba(239,68,68,0.1); color: #ef4444; }
    .due-badge.due-soon { background: rgba(245,158,11,0.1); color: #f59e0b; }
    .due-badge.upcoming { background: rgba(0,107,63,0.1); color: var(--primary-color, #006B3F); }
    .due-badge.paid { background: rgba(34,197,94,0.1); color: #22c55e; }
    .due-badge i { width: 13px; height: 13px; }
    .sub-actions { display: flex; gap: 8px; }
    .btn-pay { padding: 8px 16px; border-radius: 10px; background: linear-gradient(135deg, var(--primary-color, #006B3F), #00a855); color: white; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-pay:active { transform: scale(0.95); opacity: 0.9; }
    .btn-icon-action { width: 34px; height: 34px; border-radius: 10px; background: var(--bg-secondary, #f3f4f6); border: 1px solid var(--border-color, #e5e7eb); color: var(--text-secondary, #6b7280); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .btn-icon-action i { width: 15px; height: 15px; }
    .btn-icon-action.danger { color: #ef4444; background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }

    /* Service-specific icon colors */
    .icon-snapchat { background: linear-gradient(135deg, #FFFC00, #FFE500) !important; }
    .icon-netflix { background: linear-gradient(135deg, #E50914, #B20710) !important; }
    .icon-spotify { background: linear-gradient(135deg, #1DB954, #169C46) !important; }
    .icon-apple-music { background: linear-gradient(135deg, #FA233B, #FB5C74) !important; }
    .icon-github { background: linear-gradient(135deg, #24292e, #0d1117) !important; }
    .icon-apple-tv { background: linear-gradient(135deg, #000000, #333333) !important; }
    .icon-dstv { background: linear-gradient(135deg, #003580, #0055B8) !important; }
    .icon-icloud { background: linear-gradient(135deg, #3693F3, #5AC8FA) !important; }
    .icon-google-storage { background: linear-gradient(135deg, #4285F4, #34A853) !important; }
    .icon-x { background: linear-gradient(135deg, #000000, #14171A) !important; }
    .icon-youtube { background: linear-gradient(135deg, #FF0000, #CC0000) !important; }
    .icon-chatgpt { background: linear-gradient(135deg, #10A37F, #1A7F64) !important; }
    .icon-other { background: linear-gradient(135deg, var(--primary-color, #006B3F), #00a855) !important; }

    .sub-icon img { width: 24px; height: 24px; object-fit: contain; }
    .selected-service-icon img { width: 24px; height: 24px; object-fit: contain; }

    /* Empty state */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary, #6b7280); }
    .empty-state i { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.3; }
    .empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text-primary, #374151); margin-bottom: 6px; }
    .empty-state p { font-size: 14px; line-height: 1.5; }

    /* Modal */
    .modal { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); overflow-y: auto; padding: 20px 16px; }
    .modal.active { display: flex; align-items: flex-end; justify-content: center; }
    .modal-sheet { background: var(--card-bg, #fff); border-radius: 24px 24px 0 0; padding: 24px; width: 100%; max-width: 480px; animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1); max-height: 92vh; overflow-y: auto; }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border-color, #e5e7eb); margin: -10px auto 20px; }
    .modal-title { font-size: 20px; font-weight: 800; color: var(--text-primary, #1f2937); margin-bottom: 20px; letter-spacing: -0.3px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary, #6b7280); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    .form-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid var(--border-color, #e5e7eb); background: var(--bg-secondary, #f9fafb); color: var(--text-primary, #1f2937); font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
    .form-input:focus { border-color: var(--primary-color, #006B3F); background: var(--card-bg, #fff); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .currency-input-wrapper { position: relative; }
    .currency-prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; font-weight: 700; color: var(--text-secondary, #6b7280); pointer-events: none; }
    .currency-input-wrapper .form-input { padding-left: 28px; }

    /* Service preset grid in modal */
    .service-presets-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .service-preset-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 6px; border: 2px solid var(--border-color, #e5e7eb); border-radius: 14px; cursor: pointer; transition: all 0.2s; background: var(--bg-secondary, #f9fafb); }
    .service-preset-item:active { transform: scale(0.95); }
    .service-preset-item.selected { border-color: var(--primary-color, #006B3F); background: rgba(0,107,63,0.06); box-shadow: 0 2px 12px rgba(0,107,63,0.15); }
    .service-preset-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .service-preset-icon img { width: 20px; height: 20px; object-fit: contain; }
    .service-preset-label { font-size: 10px; font-weight: 600; color: var(--text-secondary, #6b7280); text-align: center; line-height: 1.2; }

    /* Selected Service Display in Modal */
    .selected-service-display { background: var(--bg-secondary, #f3f4f6); border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .selected-service-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .selected-service-name { font-size: 15px; font-weight: 700; color: var(--text-primary, #1f2937); }
    .selected-service-cat { font-size: 11px; color: var(--text-secondary, #6b7280); }

    /* Fab */
    .fab { position: fixed; bottom: calc(80px + env(safe-area-inset-bottom, 0px)); right: 20px; width: 56px; height: 56px; border-radius: 18px; background: linear-gradient(135deg, var(--primary-color, #006B3F), #00a855); color: white; border: none; box-shadow: 0 8px 24px rgba(0,107,63,0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 50; transition: all 0.25s; }
    .fab:active { transform: scale(0.92); }
    .fab i { width: 24px; height: 24px; }

    /* Loading skeleton */
    .skeleton { background: linear-gradient(90deg, var(--bg-secondary,#f3f4f6) 25%, var(--border-color,#e5e7eb) 50%, var(--bg-secondary,#f3f4f6) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 12px; height: 100px; margin-bottom: 12px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="mtn-header">
    <!-- Shimmer sweep -->
    <div class="mtn-header-shimmer"></div>
    <!-- Floating particles -->
    <div class="header-particles">
      <span class="header-particle"></span>
      <span class="header-particle"></span>
      <span class="header-particle"></span>
      <span class="header-particle"></span>
      <span class="header-particle"></span>
    </div>
    <div class="mtn-topbar">
      <a href="dashboard.html" class="mtn-back-btn"><i data-lucide="arrow-left"></i></a>
      <span class="mtn-page-title">Subscriptions</span>
      <div class="mtn-topbar-spacer"></div>
    </div>
    <div class="mtn-info-section">
      <div class="mtn-info-icon"><i data-lucide="repeat"></i></div>
      <div class="mtn-info-title">Manage Subscriptions</div>
      <div class="mtn-info-subtitle">Track recurring services & payments</div>
    </div>

    <!-- Subscription summary inside header -->
    <div class="header-balance">
      <div class="header-balance-label">Monthly Cost</div>
      <div class="header-balance-amount" id="summaryMonthly">&#8373;0.00</div>
      <div class="header-balance-sub" id="summaryYearly">&#8373;0.00 / year</div>
      <div class="header-balance-row">
        <div class="header-balance-item">
          <div class="header-balance-item-label">Active</div>
          <div class="header-balance-item-value active-count" id="summaryActive">0</div>
        </div>
        <div class="header-balance-item">

        <div class="header-balance-item">

        </div>
      </div>
    </div>

    <div class="mtn-header-curve"></div>
  </header>

    <!-- Filter Tabs -->

      <button class="filter-tab" data-filter="due-soon" onclick="setFilter('due-soon', this)">Due Soon <span class="tab-count" id="countDueSoon">0</span></button>

  <!-- Add/Edit Subscription Modal -->
  <div id="subModal" class="modal">
    <div class="modal-sheet">

      <!-- Service Presets Grid -->

        <div class="service-preset-item" data-service="spotify" onclick="selectPreset(this)">
          <div class="service-preset-icon icon-spotify"><img src="https://cdn.simpleicons.org/spotify/white" alt="Spotify"></div>
          <div class="service-preset-label">Spotify</div>
        </div>
        <div class="service-preset-item" data-service="youtube" onclick="selectPreset(this)">
          <div class="service-preset-icon icon-youtube"><img src="https://cdn.simpleicons.org/youtube/white" alt="YouTube"></div>
          <div class="service-preset-label">YouTube</div>
        </div>
        <div class="service-preset-item" data-service="chatgpt" onclick="selectPreset(this)">
          <div class="service-preset-icon icon-chatgpt"><img src="https://cdn.simpleicons.org/openai/white" alt="ChatGPT"></div>
          <div class="service-preset-label">ChatGPT</div>

        <div class="service-preset-item" data-service="apple-music" onclick="selectPreset(this)">
          <div class="service-preset-icon icon-apple-music"><img src="https://cdn.simpleicons.org/applemusic/white" alt="Apple Music"></div>
          <div class="service-preset-label">Apple Music</div>
        </div>
        <div class="service-preset-item" data-service="dstv" onclick="selectPreset(this)">
          <div class="service-preset-icon icon-dstv"><img src="https://cdn.simpleicons.org/dstv/white" alt="DStv"></div>
          <div class="service-preset-label">DStv</div>
        </div>
        <div class="service-preset-item" data-service="github" onclick="selectPreset(this)">
          <div class="service-preset-icon icon-github"><img src="https://cdn.simpleicons.org/github/white" alt="GitHub"></div>
          <div class="service-preset-label">GitHub</div>
        </div>
        <div class="service-preset-item" data-service="icloud" onclick="selectPreset(this)">
          <div class="service-preset-icon icon-icloud"><img src="https://cdn.simpleicons.org/icloud/white" alt="iCloud"></div>
          <div class="service-preset-label">iCloud</div>
        </div>
        <div class="service-preset-item" data-service="snapchat" onclick="selectPreset(this)">
          <div class="service-preset-icon icon-snapchat"><img src="https://cdn.simpleicons.org/snapchat/white" alt="Snapchat"></div>
          <div class="service-preset-label">Snapchat+</div>
        </div>
        <div class="service-preset-item" data-service="x" onclick="selectPreset(this)">
          <div class="service-preset-icon icon-x"><img src="https://cdn.simpleicons.org/x/white" alt="X"></div>
          <div class="service-preset-label">X Premium</div>
        </div>
        <div class="service-preset-item" data-service="google-storage" onclick="selectPreset(this)">
          <div class="service-preset-icon icon-google-storage"><img src="https://cdn.simpleicons.org/googlecloud/white" alt="Google One"></div>
          <div class="service-preset-label">Google One</div>
        </div>
        <div class="service-preset-item" data-service="other" onclick="selectPreset(this)">
          <div class="service-preset-icon icon-other"><i data-lucide="plus" style="width:18px;height:18px;color:white;"></i></div>
          <div class="service-preset-label">Other</div>
        </div>
      </div>

      <!-- Selected Service Display -->
      <div id="selectedServiceDisplay" class="selected-service-display" style="display:none;">
        <div id="selectedServiceIcon" class="selected-service-icon icon-other"></div>
        <div>
          <div id="selectedServiceName" class="selected-service-name">Service</div>
          <div id="selectedServiceCat" class="selected-service-cat">Category</div>
        </div>

      <form id="subForm" onsubmit="handleSubmitSub(event)">
        <input type="hidden" id="editSubId">
        <input type="hidden" id="selectedService" value="">
        <div class="form-group" id="serviceNameGroup">
          <label class="form-label">Service Name</label>
          <input type="text" class="form-input" id="subName" placeholder="e.g., Netflix" required>

          <div class="form-group">
            <label class="form-label">Amount</label>

              <span class="currency-prefix" id="currencyPrefix">&#8373;</span>
              <input type="number" class="form-input" id="subAmount" placeholder="0.00" step="0.01" min="0.01" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Frequency</label>
            <select class="form-input" id="subFrequency">
              <option value="monthly">Monthly</option>
              <option value="weekly">Weekly</option>
              <option value="quarterly">Quarterly</option>
              <option value="yearly">Yearly</option>

          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-input" id="subCategory">
              <option value="Entertainment">Entertainment</option>
              <option value="Music">Music</option>
              <option value="Social Media">Social Media</option>
              <option value="Cloud Storage">Cloud Storage</option>
              <option value="Developer Tools">Developer Tools</option>
              <option value="AI Tools">AI Tools</option>
              <option value="Software">Software</option>
              <option value="Health">Health</option>
              <option value="Education">Education</option>
              <option value="Utilities">Utilities</option>
              <option value="Finance">Finance</option>
              <option value="Shopping">Shopping</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Next Due Date</label>
            <input type="date" class="form-input" id="subNextDue" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes (optional)</label>
          <input type="text" class="form-input" id="subNotes" placeholder="e.g., Family plan">
        </div>
        <div style="display:flex; gap:10px; margin-top:4px;">
          <button type="button" class="btn" style="flex:1; background:var(--bg-secondary,#f3f4f6); color:var(--text-secondary,#6b7280); border:none;" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn" style="flex:2; background:linear-gradient(135deg,var(--primary-color,#006B3F),#00a855); color:white; border:none; font-weight:700;" id="formSubmitBtn">Save Subscription</button>
        </div>

  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    utils.requireAuth();

    let allSubscriptions = [];
    let currentFilter = 'all';

    // Service Data
    const servicePresets = {
      'snapchat': { name: 'Snapchat+', category: 'Social Media', iconUrl: 'https://cdn.simpleicons.org/snapchat/white', iconClass: 'icon-snapchat' },
      'netflix': { name: 'Netflix', category: 'Entertainment', iconUrl: 'https://cdn.simpleicons.org/netflix/white', iconClass: 'icon-netflix' },
      'spotify': { name: 'Spotify', category: 'Music', iconUrl: 'https://cdn.simpleicons.org/spotify/white', iconClass: 'icon-spotify' },
      'apple-music': { name: 'Apple Music', category: 'Music', iconUrl: 'https://cdn.simpleicons.org/applemusic/white', iconClass: 'icon-apple-music' },
      'github': { name: 'GitHub Pro', category: 'Developer Tools', iconUrl: 'https://cdn.simpleicons.org/github/white', iconClass: 'icon-github' },
      'apple-tv': { name: 'Apple TV+', category: 'Entertainment', iconUrl: 'https://cdn.simpleicons.org/appletv/white', iconClass: 'icon-apple-tv' },
      'dstv': { name: 'DStv', category: 'Entertainment', iconUrl: 'https://cdn.simpleicons.org/dstv/white', iconClass: 'icon-dstv' },
      'icloud': { name: 'iCloud Storage', category: 'Cloud Storage', iconUrl: 'https://cdn.simpleicons.org/icloud/white', iconClass: 'icon-icloud' },
      'google-storage': { name: 'Google One', category: 'Cloud Storage', iconUrl: 'https://cdn.simpleicons.org/googlecloud/white', iconClass: 'icon-google-storage' },
      'x': { name: 'X Premium', category: 'Social Media', iconUrl: 'https://cdn.simpleicons.org/x/white', iconClass: 'icon-x' },
      'youtube': { name: 'YouTube Premium', category: 'Entertainment', iconUrl: 'https://cdn.simpleicons.org/youtube/white', iconClass: 'icon-youtube' },
      'chatgpt': { name: 'ChatGPT Plus', category: 'AI Tools', iconUrl: 'https://cdn.simpleicons.org/openai/white', iconClass: 'icon-chatgpt' },
      'other': { name: '', category: 'Other', iconUrl: '', iconClass: 'icon-other' }
    };

    // Preset Selection
    function selectPreset(item) {
      document.querySelectorAll('.service-preset-item').forEach(el => el.classList.remove('selected'));
      item.classList.add('selected');

      const serviceKey = item.dataset.service;
      const service = servicePresets[serviceKey];
      document.getElementById('selectedService').value = serviceKey;

      if (serviceKey === 'other') {
        document.getElementById('selectedServiceDisplay').style.display = 'none';
        document.getElementById('serviceNameGroup').style.display = 'block';
        document.getElementById('subName').value = '';
        document.getElementById('subCategory').value = 'Other';
      } else {
        document.getElementById('selectedServiceDisplay').style.display = 'flex';
        document.getElementById('serviceNameGroup').style.display = 'none';
        document.getElementById('selectedServiceIcon').className = 'selected-service-icon ' + service.iconClass;
        document.getElementById('selectedServiceIcon').innerHTML = service.iconUrl
          ? '<img src="' + service.iconUrl + '" alt="' + service.name + '">'
          : service.name.charAt(0);
        document.getElementById('selectedServiceName').textContent = service.name;
        document.getElementById('selectedServiceCat').textContent = service.category;
        document.getElementById('subName').value = service.name;
        document.getElementById('subCategory').value = service.category;
      }
    }

    // Load & Render
    async function loadAll() {
      try {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '../index.html'; return; }

        const [subsResp, insightsResp] = await Promise.all([
          api.getSubscriptions(),
          api.getSubscriptionInsights()
        ]);

        allSubscriptions = Array.isArray(subsResp.data) ? subsResp.data : [];
        renderInsights(insightsResp.data);
        renderList();
        updateCounts();
      } catch (err) {
        console.error('Subscriptions load error:', err);
        let errorMsg = 'Check your connection and try again.';
        let iconName = 'wifi-off';
        if (err.status === 401 || (err.message && err.message.includes('token'))) {
          errorMsg = 'Session expired. Please log in again.';
          iconName = 'log-in';
          localStorage.removeItem('token');
          setTimeout(function() { window.location.href = '../index.html'; }, 2000);
        } else if (err.message && err.message.includes('Failed to fetch')) {
          errorMsg = 'Server unavailable. Please try again later.';
          iconName = 'server-off';
        }
        if (typeof utils !== 'undefined' && utils.showAlert) utils.showAlert('Failed to load subscriptions', 'error');
        document.getElementById('subscriptionsContainer').innerHTML =
          '<div class="empty-state">' +
            '<i data-lucide="' + iconName + '"></i>' +
            '<h3>Couldn\'t load data</h3>' +
            '<p>' + errorMsg + '</p>' +
          '</div>';
        lucide.createIcons({ node: document.getElementById('subscriptionsContainer') });
      }
    }

    function renderInsights(data) {
      if (!data) return;
      var sym = (typeof utils !== 'undefined' && utils.getCurrencySymbol) ? utils.getCurrencySymbol() : '\u20B5';

      document.getElementById('summaryMonthly').textContent =
        sym + (data.total_monthly_cost || 0).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      document.getElementById('summaryYearly').textContent =
        sym + (data.total_yearly_cost || 0).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' / year';
      document.getElementById('summaryActive').textContent = data.total_active || 0;
      document.getElementById('summaryDueSoon').textContent = (data.upcoming_this_week || []).length;
      document.getElementById('summaryOverdue').textContent = (data.overdue || []).length;

      var alertsEl = document.getElementById('alertsContainer');
      alertsEl.innerHTML = '';
      if (data.alerts && data.alerts.length > 0) {
        data.alerts.forEach(function(a) {
          var iconMap = { warning: 'alert-triangle', danger: 'alert-circle', info: 'info', success: 'check-circle' };
          alertsEl.innerHTML +=
            '<div class="alert-banner alert-' + a.type + '">' +
              '<i data-lucide="' + (iconMap[a.type] || 'info') + '"></i>' +
              '<span>' + a.message + '</span>' +
            '</div>';
        });
        lucide.createIcons({ node: alertsEl });
      }
    }

    function getServiceIcon(name) {
      var lowName = name.toLowerCase();
      for (var key in servicePresets) {
        if (key !== 'other') {
          var data = servicePresets[key];
          if (lowName.includes(key) || lowName.includes(data.name.toLowerCase().split(' ')[0])) {
            return { iconUrl: data.iconUrl, iconClass: data.iconClass, initial: data.name.charAt(0) };
          }
        }
      }
      return { iconUrl: '', iconClass: 'icon-other', initial: name.charAt(0).toUpperCase() };
    }

    function renderList() {
      var container = document.getElementById('subscriptionsContainer');
      var filtered = allSubscriptions;

      if (currentFilter === 'active') filtered = allSubscriptions.filter(function(s) { return s.status === 'active'; });
      else if (currentFilter === 'due-soon') filtered = allSubscriptions.filter(function(s) { return s.is_due_soon && s.status === 'active'; });
      else if (currentFilter === 'overdue') filtered = allSubscriptions.filter(function(s) { return s.is_overdue && s.status === 'active'; });
      else if (currentFilter === 'cancelled') filtered = allSubscriptions.filter(function(s) { return s.status === 'cancelled'; });

      if (filtered.length === 0) {
        container.innerHTML =
          '<div class="empty-state">' +
            '<i data-lucide="repeat"></i>' +
            '<h3>No subscriptions here</h3>' +
            '<p>Tap the + button to add your first subscription.</p>' +
          '</div>';
        lucide.createIcons({ node: container });
        return;
      }

      var sym = (typeof utils !== 'undefined' && utils.getCurrencySymbol) ? utils.getCurrencySymbol() : '\u20B5';
      container.innerHTML = filtered.map(function(s) { return buildCard(s, sym); }).join('');
      lucide.createIcons({ node: container });
    }

    function buildCard(s, sym) {
      var isCancelled = s.status === 'cancelled';
      var classes = 'sub-card';
      if (isCancelled) classes += ' cancelled';
      else if (s.is_overdue) classes += ' overdue';
      else if (s.is_due_soon) classes += ' due-soon';

      var badgeClass, badgeIcon, badgeText;
      if (isCancelled) { badgeClass = 'paid'; badgeIcon = 'x-circle'; badgeText = 'Cancelled'; }
      else if (s.is_overdue) { badgeClass = 'overdue'; badgeIcon = 'alert-circle'; badgeText = 'Overdue'; }
      else if (s.is_due_soon) { badgeClass = 'due-soon'; badgeIcon = 'clock'; badgeText = 'Due in ' + s.days_until_due + 'd'; }
      else { badgeClass = 'upcoming'; badgeIcon = 'calendar'; badgeText = s.days_until_due === 0 ? 'Due today' : 'Due in ' + s.days_until_due + 'd'; }

      var serviceInfo = getServiceIcon(s.name);
      var freqMap = { weekly: '/wk', monthly: '/mo', quarterly: '/qtr', yearly: '/yr' };
      var freqLabel = freqMap[s.frequency] || '/mo';
      var iconContent = serviceInfo.iconUrl
        ? '<img src="' + serviceInfo.iconUrl + '" alt="' + escHtml(s.name) + '">'
        : serviceInfo.initial;

      var html = '<div class="' + classes + '">' +
        '<div class="sub-header">' +
          '<div class="sub-icon ' + serviceInfo.iconClass + '">' + iconContent + '</div>' +
          '<div style="flex:1; min-width:0;">' +
            '<div class="sub-name">' + escHtml(s.name) + '</div>' +
            '<div class="sub-category">' + escHtml(s.category) + '</div>' +
          '</div>' +
          '<div class="sub-amount">' +
            '<div class="sub-amount-value">' + sym + parseFloat(s.amount).toFixed(2) + '</div>' +
            '<div class="sub-amount-freq">' + freqLabel + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="sub-meta">' +
          '<span class="due-badge ' + badgeClass + '">' +
            '<i data-lucide="' + badgeIcon + '"></i>' +
            badgeText +
          '</span>' +
          '<div class="sub-actions">';
      if (!isCancelled) {
        html += '<button class="btn-pay" onclick="handlePay(\'' + s.id + '\', \'' + escHtml(s.name) + '\')">Pay Now</button>';
      }
      html += '<button class="btn-icon-action" onclick="openEditModal(\'' + s.id + '\')" title="Edit"><i data-lucide="edit-2"></i></button>' +
        '<button class="btn-icon-action danger" onclick="handleDelete(\'' + s.id + '\', \'' + escHtml(s.name) + '\')" title="' + (isCancelled ? 'Delete' : 'Cancel') + '"><i data-lucide="' + (isCancelled ? 'trash-2' : 'x') + '"></i></button>' +
        '</div></div>';
      if (s.notes) {
        html += '<div style="margin-top:10px; font-size:12px; color:var(--text-secondary,#6b7280); padding-top:10px; border-top:1px solid var(--border-color,#e5e7eb);">' + escHtml(s.notes) + '</div>';
      }
      html += '</div>';
      return html;
    }

    function updateCounts() {
      document.getElementById('countAll').textContent = allSubscriptions.length;
      document.getElementById('countActive').textContent = allSubscriptions.filter(function(s) { return s.status === 'active'; }).length;
      document.getElementById('countDueSoon').textContent = allSubscriptions.filter(function(s) { return s.is_due_soon && s.status === 'active'; }).length;
      document.getElementById('countOverdue').textContent = allSubscriptions.filter(function(s) { return s.is_overdue && s.status === 'active'; }).length;
      document.getElementById('countCancelled').textContent = allSubscriptions.filter(function(s) { return s.status === 'cancelled'; }).length;
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
      btn.classList.add('active');
      renderList();
    }

    // Pay
    async function handlePay(id, name) {
      if (!confirm('Record payment for ' + name + '?')) return;
      try {
        utils.showLoading();
        await api.paySubscription(id);
        utils.hideLoading();
        utils.showAlert('Payment recorded for ' + name + '!', 'success');
        await loadAll();
      } catch (err) {
        utils.hideLoading();
        utils.showAlert(err.message || 'Payment failed', 'error');
      }
    }

    // Delete / Cancel
    async function handleDelete(id, name) {
      var sub = allSubscriptions.find(function(s) { return s.id == id; });
      var isCancelled = sub && sub.status === 'cancelled';
      var action = isCancelled ? 'permanently delete' : 'cancel';
      if (!confirm((isCancelled ? 'Delete' : 'Cancel') + ' subscription "' + name + '"?')) return;
      try {
        utils.showLoading();
        await api.deleteSubscription(id, isCancelled);
        utils.hideLoading();
        utils.showAlert('Subscription ' + (isCancelled ? 'deleted' : 'cancelled'), 'success');
        await loadAll();
      } catch (err) {
        utils.hideLoading();
        utils.showAlert(err.message || 'Failed', 'error');
      }
    }

    // Modal
    function openModal() {
      document.getElementById('editSubId').value = '';
      document.getElementById('modalTitle').textContent = 'New Subscription';
      document.getElementById('formSubmitBtn').textContent = 'Save Subscription';
      document.getElementById('subForm').reset();
      document.getElementById('selectedService').value = '';
      document.getElementById('selectedServiceDisplay').style.display = 'none';
      document.getElementById('serviceNameGroup').style.display = 'block';
      document.getElementById('servicePresetsGrid').style.display = 'grid';
      document.querySelectorAll('.service-preset-item').forEach(function(c) { c.classList.remove('selected'); });

      var d = new Date();
      d.setMonth(d.getMonth() + 1);
      document.getElementById('subNextDue').value = d.toISOString().split('T')[0];
      document.getElementById('subModal').classList.add('active');
      document.body.style.overflow = 'hidden';
      lucide.createIcons({ node: document.getElementById('subModal') });
    }

    function openEditModal(id) {
      var s = allSubscriptions.find(function(sub) { return sub.id == id; });
      if (!s) return;
      document.getElementById('editSubId').value = s.id;
      document.getElementById('modalTitle').textContent = 'Edit Subscription';
      document.getElementById('formSubmitBtn').textContent = 'Update Subscription';
      document.getElementById('subName').value = s.name;
      document.getElementById('subAmount').value = s.amount;
      document.getElementById('subFrequency').value = s.frequency;
      document.getElementById('subCategory').value = s.category;
      document.getElementById('subNextDue').value = s.next_due_date ? s.next_due_date.split('T')[0] : '';
      document.getElementById('subNotes').value = s.notes || '';
      document.getElementById('servicePresetsGrid').style.display = 'none';

      var serviceInfo = getServiceIcon(s.name);
      document.getElementById('selectedServiceDisplay').style.display = 'flex';
      document.getElementById('selectedServiceIcon').className = 'selected-service-icon ' + serviceInfo.iconClass;
      document.getElementById('selectedServiceIcon').innerHTML = serviceInfo.iconUrl
        ? '<img src="' + serviceInfo.iconUrl + '" alt="' + escHtml(s.name) + '">'
        : serviceInfo.initial;
      document.getElementById('selectedServiceName').textContent = s.name;
      document.getElementById('selectedServiceCat').textContent = s.category;
      document.getElementById('serviceNameGroup').style.display = 'none';

      document.getElementById('subModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('subModal').classList.remove('active');
      document.body.style.overflow = '';
      document.querySelectorAll('.service-preset-item').forEach(function(c) { c.classList.remove('selected'); });
    }

    document.getElementById('subModal').addEventListener('click', function(e) {
      if (e.target === document.getElementById('subModal')) closeModal();
    });

    async function handleSubmitSub(e) {
      e.preventDefault();
      var editId = document.getElementById('editSubId').value;
      var payload = {
        name: document.getElementById('subName').value.trim(),
        amount: parseFloat(document.getElementById('subAmount').value),
        frequency: document.getElementById('subFrequency').value,
        category: document.getElementById('subCategory').value,
        next_due_date: document.getElementById('subNextDue').value,
        notes: document.getElementById('subNotes').value.trim() || null
      };
      try {
        utils.showLoading();
        if (editId) {
          await api.updateSubscription(editId, payload);
          utils.hideLoading();
          utils.showAlert('Subscription updated', 'success');
        } else {
          await api.createSubscription(payload);
          utils.hideLoading();
          utils.showAlert('Subscription added', 'success');
        }
        closeModal();
        await loadAll();
      } catch (err) {
        utils.hideLoading();
        utils.showAlert(err.message || 'Failed to save', 'error');
      }
    }

    // Utility
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Init
    document.addEventListener('DOMContentLoaded', function() {
      lucide.createIcons();
      var prefixEls = document.querySelectorAll('.currency-prefix');
      if (typeof utils !== 'undefined' && utils.getCurrencySymbol) {
        prefixEls.forEach(function(el) { el.textContent = utils.getCurrencySymbol(); });
      }
      loadAll();
    });
  </script>
</body>
</html>
