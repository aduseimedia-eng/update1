<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#006B3F">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <title>KudiSave - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    @font-face {
      font-family: 'Cal Sans';
      src: url('https://cdn.jsdelivr.net/npm/cal-sans@1.0.1/fonts/CalSans-SemiBold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Lottie for animations -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <script>
    (function() {
      // First-time visitors see onboarding before anything else
      const hasCompletedOnboarding = localStorage.getItem('onboardingComplete');
      if (!hasCompletedOnboarding) {
        window.location.href = 'pages/onboarding.html';
        return;
      }
      // Returning visitors see splash once per session
      const hasSeenSplash = sessionStorage.getItem('splashShown');
      if (!hasSeenSplash) {
        sessionStorage.setItem('splashShown', 'true');
        window.location.href = 'pages/splash.html';
      }
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 0;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: #f8faf9;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Animated Background ===== */
    .auth-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(160deg, #f8faf9 0%, #eef5f1 30%, #f0f7f4 60%, #f5faf7 100%);
      overflow: hidden;
    }

    .auth-bg::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 160, 94, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      animation: floatOrb 20s ease-in-out infinite;
    }

    .auth-bg::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -15%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0, 107, 63, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      animation: floatOrb 25s ease-in-out infinite reverse;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0,107,63,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,107,63,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    .floating-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.5;
      filter: blur(1px);
    }

    .shape-1 {
      width: 6px; height: 6px;
      background: rgba(0, 160, 94, 0.45);
      top: 15%; left: 20%;
      animation: float1 12s ease-in-out infinite;
    }
    .shape-2 {
      width: 4px; height: 4px;
      background: rgba(252, 209, 22, 0.5);
      top: 25%; right: 25%;
      animation: float2 15s ease-in-out infinite;
    }
    .shape-3 {
      width: 8px; height: 8px;
      background: rgba(206, 17, 38, 0.25);
      bottom: 30%; left: 12%;
      animation: float3 18s ease-in-out infinite;
    }
    .shape-4 {
      width: 5px; height: 5px;
      background: rgba(252, 209, 22, 0.4);
      bottom: 20%; right: 15%;
      animation: float1 14s ease-in-out infinite reverse;
    }
    .shape-5 {
      width: 3px; height: 3px;
      background: rgba(0, 160, 94, 0.35);
      top: 60%; left: 35%;
      animation: float2 10s ease-in-out infinite;
    }
    /* Ghana Star accent */
    .shape-6 {
      width: 10px; height: 10px;
      background: rgba(0, 0, 0, 0.08);
      top: 40%; right: 10%;
      animation: float3 16s ease-in-out infinite;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      border-radius: 0;
      opacity: 0.7;
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(15px, 30px) scale(1.02); }
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, -30px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-15px, 20px); }
      66% { transform: translate(10px, -10px); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-25px, -20px); }
    }

    /* ===== Main Container ===== */
    .auth-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 0;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    }

    /* ===== Card ===== */
    .auth-card {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0 20px;
      max-width: 440px;
      width: 100%;
      position: relative;
      overflow: visible;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      animation: cardEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes cardEnter {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Header ===== */
    /* ===== Kente-Inspired Strip ===== */
    .kente-strip {
      width: 80px;
      height: 4px;
      margin: 0 auto 16px;
      border-radius: 2px;
      background: repeating-linear-gradient(
        90deg,
        #CE1126 0px, #CE1126 8px,
        #FCD116 8px, #FCD116 16px,
        #006B3F 16px, #006B3F 24px,
        #000000 24px, #000000 28px,
        #006B3F 28px, #006B3F 36px,
        #FCD116 36px, #FCD116 44px,
        #CE1126 44px, #CE1126 52px
      );
      animation: kenteShimmer 3s ease-in-out infinite;
    }

    @keyframes kenteShimmer {
      0%, 100% { opacity: 0.85; width: 80px; }
      50% { opacity: 1; width: 100px; }
    }

    /* ===== Adinkra Watermark ===== */
    .adinkra-accent {
      position: absolute;
      top: -30px;
      right: -20px;
      width: 80px;
      height: 80px;
      opacity: 0.04;
      z-index: 0;
      pointer-events: none;
    }

    .auth-header {
      text-align: center;
      margin-top: 0;
      margin-bottom: 28px;
      position: relative;
    }

    .auth-logo-wrap {
      margin: 0 auto 0;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .auth-logo-wrap img.auth-logo-img {
      width: 70vw;
      max-width: 280px;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .auth-title {
      font-family: 'Cal Sans', sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: #111827;
      letter-spacing: -0.5px;
      margin-top: 0;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      color: #6b7280;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
    }

    /* ===== Pill Tab Switcher ===== */
    .auth-tabs {
      display: flex;
      background: #f3f4f6;
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 28px;
      position: relative;
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .tab-slider {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: linear-gradient(135deg, #00a05e, #006B3F);
      border-radius: 11px;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 160, 94, 0.3);
      z-index: 0;
    }

    .tab-slider.register {
      transform: translateX(100%);
    }

    .auth-tab {
      flex: 1;
      padding: 12px 16px;
      background: none;
      border: none;
      border-radius: 11px;
      color: #6b7280;
      cursor: pointer;
      transition: color 0.3s ease;
      font-weight: 600;
      font-size: 14px;
      text-align: center;
      position: relative;
      z-index: 1;
      touch-action: manipulation;
      font-family: inherit;
    }

    .auth-tab.active {
      color: #ffffff;
    }

    .auth-tab:active {
      transform: scale(0.97);
    }

    /* ===== Forms ===== */
    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
      animation: formFadeIn 0.35s ease;
    }

    @keyframes formFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Google Button (Hero) ===== */
    .google-btn {
      width: 100%;
      padding: 15px 20px;
      background: #ffffff;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #1f2937;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .google-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(66,133,244,0.04), rgba(52,168,83,0.04), rgba(251,188,5,0.04), rgba(234,67,53,0.04));
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: inherit;
    }

    .google-btn:hover {
      border-color: #c5c9d0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }

    .google-btn:hover::after {
      opacity: 1;
    }

    .google-btn:active {
      transform: scale(0.98) translateY(0);
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .google-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .google-btn span,
    .google-btn .google-btn-text {
      position: relative;
      z-index: 1;
    }

    .google-btn-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      color: #006B3F;
      background: rgba(0, 107, 63, 0.08);
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 6px;
      letter-spacing: 0.3px;
      position: relative;
      z-index: 1;
    }

    /* ===== Divider ===== */
    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      gap: 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .divider span {
      color: #9ca3af;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== Form Groups ===== */
    .auth-form .form-group {
      margin-bottom: 18px;
      position: relative;
    }

    .auth-form .form-label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      color: #374151;
      font-size: 12px;
      letter-spacing: 0.3px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon-left {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      pointer-events: none;
      transition: color 0.3s ease;
      z-index: 2;
    }

    .input-icon-left i {
      width: 18px;
      height: 18px;
      stroke-width: 2;
    }

    .auth-form .form-input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 14px;
      color: #111827;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-appearance: none;
      appearance: none;
    }

    .auth-form .form-input::placeholder {
      color: #9ca3af;
    }

    .auth-form .form-input:focus {
      outline: none;
      border-color: #00a05e;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(0, 160, 94, 0.12), 0 4px 20px rgba(0, 160, 94, 0.06);
    }

    .auth-form .form-input:focus ~ .input-icon-left,
    .auth-form .form-input:not(:placeholder-shown) ~ .input-icon-left {
      color: #00a05e;
    }

    /* Password toggle */
    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      padding: 4px;
      display: flex;
      z-index: 2;
      transition: color 0.2s ease;
    }

    .password-toggle:hover {
      color: #6b7280;
    }

    .password-toggle i {
      width: 18px;
      height: 18px;
      stroke-width: 2;
    }

    .form-hint {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      color: #9ca3af;
      padding-left: 2px;
    }

    /* ===== Password Strength ===== */
    .password-strength {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .strength-bar {
      flex: 1;
      height: 3px;
      background: #e5e7eb;
      border-radius: 2px;
      transition: background 0.3s ease;
    }

    .strength-bar.weak { background: #ef4444; }
    .strength-bar.medium { background: #f59e0b; }
    .strength-bar.strong { background: #00a05e; }

    .strength-text {
      font-size: 10px;
      margin-top: 4px;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .strength-text.weak { color: #ef4444; }
    .strength-text.medium { color: #f59e0b; }
    .strength-text.strong { color: #00a05e; }

    /* ===== Forgot Password ===== */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      color: #006B3F;
      text-decoration: none;
      font-weight: 500;
      margin-top: -8px;
      margin-bottom: 20px;
      transition: color 0.2s ease;
    }

    .forgot-link:hover {
      color: #00a05e;
    }

    /* ===== Submit Buttons ===== */
    .auth-submit {
      width: 100%;
      padding: 15px 24px;
      background: linear-gradient(135deg, #00a05e 0%, #006B3F 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      font-family: inherit;
      letter-spacing: -0.1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(0, 160, 94, 0.25);
    }

    .auth-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .auth-submit:hover::before {
      transform: translateX(100%);
    }

    .auth-submit:active {
      transform: scale(0.98);
      box-shadow: 0 2px 10px rgba(0, 160, 94, 0.25);
    }

    .auth-submit.loading {
      pointer-events: none;
      opacity: 0.85;
    }

    .auth-submit .btn-text {
      transition: opacity 0.2s ease;
    }

    .auth-submit.loading .btn-text {
      opacity: 0;
    }

    .auth-submit .btn-spinner {
      position: absolute;
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .auth-submit.loading .btn-spinner {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }



    /* ===== Footer ===== */
    .auth-footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #f3f4f6;
    }

    .auth-footer p {
      color: #9ca3af;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.5;
    }

    .auth-footer .secure-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #006B3F;
      font-size: 11px;
      font-weight: 500;
      margin-top: 8px;
    }

    .auth-footer .secure-badge i {
      width: 13px;
      height: 13px;
      stroke-width: 2.5;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 14px 24px;
      border-radius: 16px;
      z-index: 10000;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
      opacity: 0;
      max-width: calc(100vw - 40px);
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: rgba(0, 107, 63, 0.9);
      border: 1px solid rgba(0, 160, 94, 0.3);
      color: white;
    }

    .toast.error {
      background: rgba(220, 53, 69, 0.9);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: white;
    }

    .toast.warning {
      background: rgba(245, 158, 11, 0.9);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: white;
    }

    .toast i {
      width: 18px;
      height: 18px;
      stroke-width: 2.5;
      flex-shrink: 0;
    }

    /* ===== Splash Overlay ===== */
    .splash-overlay {
      position: fixed;
      inset: 0;
      background: #006B3F;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .splash-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .splash-overlay .splash-logo {
      margin-bottom: 12px;
      animation: bounceIn 0.6s ease;
      color: #00e676;
    }

    .splash-overlay .splash-logo-img {
      width: 100px;
      height: auto;
    }

    .splash-overlay .splash-title {
      font-size: 22px;
      font-weight: 800;
      color: white;
      margin-bottom: 4px;
    }

    .splash-overlay .splash-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 24px;
    }

    .splash-overlay .splash-loader {
      display: flex;
      gap: 8px;
    }

    .splash-overlay .splash-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00a05e;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .splash-overlay .splash-dot:nth-child(1) { animation-delay: 0s; }
    .splash-overlay .splash-dot:nth-child(2) { animation-delay: 0.2s; }
    .splash-overlay .splash-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }



    /* ===== Responsive ===== */
    @media (max-width: 440px) {
      .auth-card {
        padding: 28px 18px 24px;
        border-radius: 24px;
        margin: 0 8px;
      }
      .auth-title {
        font-size: 24px;
      }
      .auth-logo-wrap img.auth-logo-img {
        max-width: 220px;
      }
    }

    @media (max-width: 360px) {
      .auth-logo-wrap img.auth-logo-img { max-width: 180px; }
      .auth-card { padding: 24px 16px 20px; }
    }

    /* ===== Landscape safety ===== */
    @media (max-height: 600px) {
      .auth-container { justify-content: flex-start; padding-top: 16px; }
      .auth-header { margin-bottom: 16px; }
      .auth-logo-wrap img.auth-logo-img { max-width: 160px; }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="auth-bg">
    <div class="bg-grid"></div>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>
    <div class="floating-shape shape-4"></div>
    <div class="floating-shape shape-5"></div>
    <div class="floating-shape shape-6"></div>
  </div>

  <!-- Splash Overlay -->
  <div class="splash-overlay hidden" id="splashOverlay">
    <div class="splash-logo"><img src="Secondary_Logo.png" alt="KudiSave" class="splash-logo-img"></div>
    <p class="splash-subtitle">Welcome back!</p>
    <div class="splash-loader">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>

  <!-- Main Auth Container -->
  <div class="auth-container">
    <div class="auth-card">

      <!-- Header -->
      <div class="auth-header">
        <!-- Adinkra Gye Nyame watermark -->
        <svg class="adinkra-accent" viewBox="0 0 100 100" fill="#006B3F" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 5C25.2 5 5 25.2 5 50s20.2 45 45 45 45-20.2 45-45S74.8 5 50 5zm0 10c19.3 0 35 15.7 35 35S69.3 85 50 85 15 69.3 15 50s15.7-35 35-35zm0 8c-3.9 0-7.5 0.8-10.8 2.3C44.5 28 50 35 50 43c0-8 5.5-15 10.8-17.7C57.5 23.8 53.9 23 50 23zm-20 15c-1.5 3.3-2.3 6.9-2.3 10.8 0-3.9-0.8-7.5-2.3-10.8C28 43.5 35 50 43 50c-8 0-15-5.5-17.7-10.8zm40 0C72 43.5 65 50 57 50c8 0 15 5.5 17.7 10.8 1.5-3.3 2.3-6.9 2.3-10.8 0 3.9 0.8 7.5 2.3 10.8zM50 57c0 8-5.5 15-10.8 17.7 3.3 1.5 6.9 2.3 10.8 2.3-3.9 0-7.5-0.8-10.8-2.3C44.5 72 50 65 50 57z"/>
        </svg>
        <div class="auth-logo-wrap">
          <img src="Secondary_Logo.png" alt="KudiSave" class="auth-logo-img">
        </div>
        <h1 class="auth-title">KudiSave</h1>
        <div class="kente-strip"></div>
        <p class="greeting-line" id="greetingWord">Akwaaba!</p>
        <p class="auth-subtitle">Master your finances, one cedi at a time 🇬🇭</p>
      </div>

      <style>
        .greeting-line {
          font-size: 22px;
          font-weight: 700;
          color: var(--primary);
          margin: 0 0 4px 0;
          min-height: 32px;
          transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .greeting-line.fade-out {
          opacity: 0;
          transform: translateY(-6px);
        }
        .greeting-line.fade-in {
          opacity: 1;
          transform: translateY(0);
        }
      </style>

      <script>
        (function() {
          var greetings = ['Akwaaba!', 'Obaake!', 'Woezo!', "A'maraba!"];
          var index = 0;
          var el = document.getElementById('greetingWord');
          if (!el) return;
          setInterval(function() {
            el.classList.add('fade-out');
            el.classList.remove('fade-in');
            setTimeout(function() {
              index = (index + 1) % greetings.length;
              el.textContent = greetings[index];
              el.classList.remove('fade-out');
              el.classList.add('fade-in');
            }, 400);
          }, 2000);
        })();
      </script>

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <div class="tab-slider" id="tabSlider"></div>
        <button class="auth-tab active" onclick="switchTab('login')" id="tabLogin">Sign In</button>
        <button class="auth-tab" onclick="switchTab('register')" id="tabRegister">Sign Up</button>
      </div>

      <!-- ==================== LOGIN FORM ==================== -->
      <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
        <!-- Google -->
        <button type="button" class="google-btn" onclick="signInWithGoogle()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span class="google-btn-text">Continue with Google</span>
          <span class="google-btn-badge">Quick</span>
        </button>

      </form>

      <!-- ==================== REGISTER FORM ==================== -->
      <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
        <!-- Google -->
        <button type="button" class="google-btn" onclick="signInWithGoogle()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span class="google-btn-text">Sign up with Google</span>
          <span class="google-btn-badge">Recommended</span>
        </button>

      </form>

      <!-- Footer -->
      <div class="auth-footer">
        <p>✨ Wo sika, wo daakye — Your money, your future ✨</p>
        <div class="secure-badge">
          <i data-lucide="shield-check"></i>
          256-bit encrypted &bull; Your data is safe
        </div>
        <p style="font-size: 11px; color: #9ca3af; margin-top: 8px;">Made with ❤️ in Ghana 🇬🇭</p>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/utils.js"></script>
  <script>
    // ===== Redirect first-time visitors =====
    (function() {
      const hasVisited = localStorage.getItem('kudisave_visited');
      const isLoggedIn = localStorage.getItem('token');
      if (!hasVisited && !isLoggedIn) {
        localStorage.setItem('kudisave_visited', 'true');
        window.location.href = 'pages/splash.html';
        return;
      }
    })();

    console.log('Login page loaded successfully!');

    // ===== Toast System =====
    let activeToast = null;
    function showToast(message, type = 'success') {
      if (activeToast) activeToast.remove();

      const iconMap = { success: 'check-circle', error: 'alert-circle', warning: 'alert-triangle' };
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i data-lucide="${iconMap[type] || 'info'}"></i><span>${message}</span>`;
      document.body.appendChild(toast);
      lucide.createIcons({ nodes: [toast] });
      activeToast = toast;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => toast.classList.add('visible'));
      });

      setTimeout(() => {
        toast.classList.remove('visible');
        setTimeout(() => { toast.remove(); if (activeToast === toast) activeToast = null; }, 400);
      }, 3500);
    }

    // ===== Tab Switching =====
    function switchTab(tab) {
      const slider = document.getElementById('tabSlider');
      const tabs = document.querySelectorAll('.auth-tab');
      const forms = document.querySelectorAll('.auth-form');

      tabs.forEach(t => t.classList.remove('active'));
      forms.forEach(f => f.classList.remove('active'));

      if (tab === 'login') {
        slider.classList.remove('register');
        document.getElementById('tabLogin').classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        slider.classList.add('register');
        document.getElementById('tabRegister').classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
    }

    // ===== Password Toggle =====
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons({ nodes: [btn] });
    }

    // ===== Password Strength =====
    function checkPasswordStrength(value) {
      const container = document.getElementById('passwordStrength');
      const text = document.getElementById('strengthText');
      const bars = [document.getElementById('str1'), document.getElementById('str2'), document.getElementById('str3'), document.getElementById('str4')];

      // Update requirement hints
      const checks = [
        { id: 'hint-length', pass: value.length >= 8 },
        { id: 'hint-upper', pass: /[A-Z]/.test(value) },
        { id: 'hint-lower', pass: /[a-z]/.test(value) },
        { id: 'hint-number', pass: /[0-9]/.test(value) }
      ];
      checks.forEach(c => {
        const el = document.getElementById(c.id);
        if (el) {
          el.style.color = c.pass ? '#10b981' : '#9ca3af';
          el.textContent = (c.pass ? '\u2713 ' : '\u25CB ') + el.textContent.replace(/^\S+\s/, '');
        }
      });

      if (!value) {
        container.style.display = 'none';
        text.textContent = '';
        return;
      }
      container.style.display = 'flex';

      let score = 0;
      if (value.length >= 8) score++;
      if (/[a-z]/.test(value) && /[A-Z]/.test(value)) score++;
      if (/[0-9]/.test(value)) score++;
      if (/[^a-zA-Z0-9]/.test(value)) score++;

      const levels = ['', 'weak', 'medium', 'medium', 'strong'];
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      const level = levels[score];

      bars.forEach((bar, i) => {
        bar.className = 'strength-bar';
        if (i < score) bar.classList.add(level);
      });

      text.className = `strength-text ${level}`;
      text.textContent = labels[score];
    }

    // ===== Button Loading State =====
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.classList.add('loading');
      } else {
        btn.classList.remove('loading');
      }
    }

    // ===== Forgot Password =====
    function handleForgotPassword(e) {
      e.preventDefault();
      const identifier = document.getElementById('loginIdentifier').value;
      if (!identifier) {
        showToast('Enter your email first, then click forgot password', 'warning');
        document.getElementById('loginIdentifier').focus();
        return;
      }
      // TODO: Wire up to password reset API
      showToast('Password reset link sent to your email!', 'success');
    }

    // ===== Google Sign-In =====
    const GOOGLE_CLIENT_ID = window.KUDISAVE_GOOGLE_CLIENT_ID ||
      '760162537864-49c7509k9sdk3hf57d2at16anhv74cul.apps.googleusercontent.com';

    function initGoogleSignIn() {
      if (typeof google !== 'undefined' && google.accounts) {
        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleGoogleCallback,
          auto_select: false,
          cancel_on_tap_outside: true
        });
      }
    }

    function signInWithGoogle() {
      if (typeof google !== 'undefined' && google.accounts) {
        // Show loading state on Google buttons
        const googleBtns = document.querySelectorAll('.google-btn');
        googleBtns.forEach(b => { 
          b.disabled = true; 
          b.style.opacity = '0.7';
          const textEl = b.querySelector('.google-btn-text');
          if (textEl) textEl.textContent = 'Connecting...';
        });

        const resetBtns = () => {
          googleBtns.forEach(b => { 
            b.disabled = false; 
            b.style.opacity = '';
            const textEl = b.querySelector('.google-btn-text');
            if (textEl) {
              const isLogin = document.getElementById('loginForm').classList.contains('active');
              textEl.textContent = isLogin ? 'Continue with Google' : 'Sign up with Google';
            }
          });
        };

        google.accounts.id.prompt((notification) => {
          if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
            // One Tap blocked - fall back to OAuth2 token flow
            google.accounts.oauth2.initTokenClient({
              client_id: GOOGLE_CLIENT_ID,
              scope: 'email profile',
              callback: async (response) => {
                if (response.access_token) {
                  await sendGoogleToken(null, response.access_token);
                } else {
                  resetBtns();
                }
              },
              error_callback: () => { resetBtns(); }
            }).requestAccessToken();
          }
        });

        // Timeout reset in case prompt is dismissed
        setTimeout(resetBtns, 30000);
      } else {
        showToast('Google Sign-In is loading. Please try again in a moment.', 'warning');
      }
    }

    async function handleGoogleCallback(response) {
      if (response.credential) {
        await sendGoogleToken(response.credential, null);
      }
    }

    async function sendGoogleToken(credential, accessToken) {
      const googleBtn = document.querySelectorAll('.google-btn');
      googleBtn.forEach(b => { b.disabled = true; b.style.opacity = '0.7'; });
      try {
        const result = await api.googleAuth(credential, accessToken);
        completeGoogleLogin(result.data);
      } catch (error) {
        console.error('Google sign-in error:', error);
        showToast(error.message || 'Google sign-in failed. Please try again.', 'error');
      } finally {
        googleBtn.forEach(b => { b.disabled = false; b.style.opacity = ''; });
      }
    }

    function completeGoogleLogin(data) {
      localStorage.setItem('onboardingComplete', 'true');
      const userName = data.user?.name || '';
      const greeting = userName ? `Welcome, ${userName.split(' ')[0]}!` : 'Signed in with Google!';
      showToast(greeting);

      // Show splash overlay for smooth transition
      const splash = document.getElementById('splashOverlay');
      if (splash) {
        splash.classList.remove('hidden');
        const subtitleEl = splash.querySelector('.splash-subtitle');
        if (subtitleEl) subtitleEl.textContent = greeting;
      }

      setTimeout(() => { window.location.href = 'pages/dashboard.html'; }, 800);
    }



    // ===== Handle Login =====
    async function handleLogin(event) {
      event.preventDefault();
      const identifier = document.getElementById('loginIdentifier').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!identifier || !password) {
        showToast('Please fill in all fields', 'error');
        return;
      }

      setLoading('loginBtn', true);
      try {
        const result = await api.login({ identifier, password });
        if (result.success) {
          showToast('Welcome back!');
          setTimeout(() => { window.location.href = 'pages/dashboard.html'; }, 500);
        }
      } catch (error) {
        console.error('Login error:', error);
        const errorData = error.response?.data?.data || error.response?.data || {};
        if (error.status === 403 && errorData.requiresEmailVerification) {
          showToast('Email verification required. Redirecting...', 'warning');
          const email = errorData.email;
          sessionStorage.setItem('pendingEmailVerification', email);
          setTimeout(() => { window.location.href = 'pages/verify-email.html'; }, 1000);
        } else {
          showToast(error.message || 'Login failed. Check your credentials.', 'error');
        }
      } finally {
        setLoading('loginBtn', false);
      }
    }

    // ===== Handle Register =====
    async function handleRegister(event) {
      event.preventDefault();
      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const phone = document.getElementById('registerPhone').value.trim();
      const password = document.getElementById('registerPassword').value;

      if (!name || !email || !phone || !password) {
        showToast('Please fill in all fields', 'error');
        return;
      }

      if (!phone.match(/^(233[0-9]{9}|0[0-9]{9})$/)) {
        showToast('Phone must be Ghana format: 0XXXXXXXXX or 233XXXXXXXXX', 'error');
        return;
      }

      if (password.length < 8) {
        showToast('Password must be at least 8 characters', 'error');
        return;
      }

      if (!/[A-Z]/.test(password)) {
        showToast('Password needs at least one uppercase letter (A-Z)', 'error');
        return;
      }
      if (!/[a-z]/.test(password)) {
        showToast('Password needs at least one lowercase letter (a-z)', 'error');
        return;
      }
      if (!/[0-9]/.test(password)) {
        showToast('Password needs at least one number (0-9)', 'error');
        return;
      }

      setLoading('registerBtn', true);
      try {
        const result = await api.register({ name, email, phone, password });
        if (result.success) {
          if (result.data.requiresEmailVerification) {
            showToast('Account created! Verify your email.');
            sessionStorage.setItem('pendingEmailVerification', email);
            setTimeout(() => { window.location.href = 'pages/verify-email.html'; }, 500);
          } else {
            showToast('Account created successfully!');
            setTimeout(() => { window.location.href = 'pages/dashboard.html'; }, 500);
          }
        }
      } catch (error) {
        console.error('Registration error:', error);
        const fieldErrors = error.response?.data?.errors;
        if (fieldErrors && fieldErrors.length > 0) {
          showToast(fieldErrors[0].message, 'error');
        } else {
          showToast(error.message || 'Registration failed', 'error');
        }
      } finally {
        setLoading('registerBtn', false);
      }
    }

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', () => {
      console.log('DOM loaded');
      lucide.createIcons();

      // Already logged in? Go to dashboard
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = 'pages/dashboard.html';
        return;
      }

      // Init Google Sign-In
      setTimeout(initGoogleSignIn, 500);

      // Hide splash overlay
      setTimeout(() => {
        const splash = document.getElementById('splashOverlay');
        if (splash) splash.classList.add('hidden');
      }, 800);
    });
  </script>
</body>
</html>
